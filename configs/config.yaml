training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 10                 # early stopping patience
  seed: 42

models:
  input_length: 360
  num_classes: 5
  checkpoint_dir: "results/checkpoints"

quantization:
  onnx_dir: "results/onnx_models"
  onnx_opset: 18
  tflite_dir: "results/tflite_models"
  calibration_samples: 1000

results:
  figures_dir: "results/figures"
  metrics_dir: "results/metrics"
