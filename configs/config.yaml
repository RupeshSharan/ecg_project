data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  splits_path: "data/splits"
  fs: 360                      # sampling frequency (Hz)
  window: 180                  # samples each side of R-peak (total beat = 360)
  test_size: 0.30
  val_size: 0.50               # of the remaining temp split → 15% each

  aami_map:
    N: 0
    L: 0
    R: 0
    e: 0
    j: 0
    A: 1
    a: 1
    J: 1
    S: 1
    V: 2
    E: 2
    F: 3
    "/": 4
    f: 4
    Q: 4

  class_names:
    - "Normal"
    - "SVEB"
    - "VEB"
    - "Fusion"
    - "Paced"

