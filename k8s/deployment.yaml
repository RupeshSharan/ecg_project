apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecg-ui
  labels:
    app: ecg-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecg-ui
  template:
    metadata:
      labels:
        app: ecg-ui
    spec:
      containers:
      - name: ecg-ui
        image: your-dockerhub-username/ecg-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8501
          name: http
        env:
        - name: STREAMLIT_SERVER_HEADLESS
          value: "true"
        - name: STREAMLIT_SERVER_PORT
          value: "8501"
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
