version: "3.9"

services:
  ecg-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecg-ui
    ports:
      - "8501:8501"
    volumes:
      - ./results/checkpoints:/app/results/checkpoints:ro
      - ./data/splits:/app/data/splits:ro
      - ./results/metrics:/app/results/metrics:ro
    restart: unless-stopped
